name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup iOS platform
        run: |
          if [ ! -f "ios/App/App.xcworkspace/contents.xcworkspacedata" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          chmod +x scripts/setup-ios.sh
          bash scripts/setup-ios.sh

      - name: Import code signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Skipping signing — secrets not configured."
            exit 0
          fi
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "Skipping provisioning profile — secrets not configured."
            exit 0
          fi
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          if [ ! -f "ios/App/App.xcworkspace/contents.xcworkspacedata" ]; then
            echo "::error::iOS Xcode project was not generated. Check Capacitor setup step."
            exit 1
          fi
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::warning::APPLE_TEAM_ID not set. Building unsigned archive for validation only."
            xcodebuild archive \
              -workspace ios/App/App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath build/App.xcarchive \
              -destination "generic/platform=iOS" \
              CODE_SIGNING_ALLOWED=NO
            exit 0
          fi
          chmod +x scripts/build-ios.sh
          bash scripts/build-ios.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AIProductScanner-ipa
          path: |
            build/ipa/*.ipa
            build/App.xcarchive
          if-no-files-found: warn
