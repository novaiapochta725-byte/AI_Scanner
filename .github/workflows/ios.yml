name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Setup iOS platform
        run: bash scripts/setup-ios-ci.sh

      - name: Build unsigned IPA (Sideloadly)
        run: bash scripts/build-ipa-unsigned.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIProductScanner-ipa
          path: build/AIProductScanner.ipa
          retention-days: 14
